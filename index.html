<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00ff88, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stats {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #00ff88;
    }

    #best .stat-value {
      color: #00ccff;
    }

    .canvas-wrapper {
      position: relative;
      border: 2px solid #1a1a2e;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.1), 0 0 80px rgba(0, 204, 255, 0.05);
    }

    canvas {
      display: block;
      border-radius: 2px;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.88);
      border-radius: 2px;
      gap: 16px;
    }

    #overlay h2 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #overlay.start h2  { color: #00ff88; }
    #overlay.gameover h2 { color: #ff4466; }

    #overlay p {
      color: #888;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    #overlay .final-score {
      font-size: 1.1rem;
      color: #fff;
    }

    button {
      margin-top: 8px;
      padding: 12px 36px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: transparent;
      color: #00ff88;
      border: 2px solid #00ff88;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    button:hover {
      background: #00ff88;
      color: #0a0a0f;
    }

    .controls {
      margin-top: 20px;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-align: center;
    }

    .controls span {
      color: #555;
    }

    #mute-btn {
      margin-top: 14px;
      background: transparent;
      border: 1px solid #222;
      color: #444;
      padding: 6px 14px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #mute-btn:hover {
      border-color: #555;
      color: #888;
      background: transparent;
    }

    #mute-btn.muted {
      color: #333;
      border-color: #1a1a1a;
    }
  </style>
</head>
<body>

  <h1>Snake</h1>

  <div class="stats">
    <div class="stat" id="score-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat" id="best">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best-score">0</div>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="canvas" width="480" height="480"></canvas>

    <div id="overlay" class="start">
      <h2>Snake</h2>
      <p>Use arrow keys or WASD to move</p>
      <button id="start-btn">Start Game</button>
    </div>
  </div>

  <div class="controls">
    <span>Arrow Keys / WASD</span> &nbsp;&middot;&nbsp; <span>P to Pause</span>
  </div>
  <button id="mute-btn">&#128266; Sound On</button>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('start-btn');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best-score');
  const muteBtn = document.getElementById('mute-btn');

  // --- Audio Engine (Web Audio API, no external files) ---
  let audioCtx = null;
  let muted = false;

  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone({ freq = 440, endFreq, type = 'sine', gain = 0.3, duration = 0.12, delay = 0 } = {}) {
    if (muted) return;
    const ac = getAudio();
    const t = ac.currentTime + delay;
    const osc = ac.createOscillator();
    const env = ac.createGain();
    osc.connect(env);
    env.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (endFreq !== undefined) osc.frequency.exponentialRampToValueAtTime(endFreq, t + duration);
    env.gain.setValueAtTime(gain, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t);
    osc.stop(t + duration + 0.01);
  }

  const sfx = {
    eat() {
      // Two-tone ascending pop — pitch rises with score for feedback
      const base = 440 + Math.min(score, 20) * 20;
      playTone({ freq: base,        endFreq: base * 1.5, type: 'sine',     gain: 0.25, duration: 0.08 });
      playTone({ freq: base * 1.5,  endFreq: base * 2,   type: 'triangle', gain: 0.15, duration: 0.07, delay: 0.07 });
    },
    start() {
      // Cheerful ascending 3-note jingle: C5 → E5 → G5
      [523, 659, 784].forEach((f, i) => {
        playTone({ freq: f, endFreq: f * 1.05, type: 'triangle', gain: 0.2, duration: 0.1, delay: i * 0.1 });
      });
    },
    die() {
      // Descending buzz then low thud
      playTone({ freq: 320, endFreq: 80,  type: 'sawtooth', gain: 0.3, duration: 0.35 });
      playTone({ freq: 100, endFreq: 40,  type: 'sine',     gain: 0.4, duration: 0.4,  delay: 0.25 });
    },
  };

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇 Sound Off' : '🔊 Sound On';
    muteBtn.classList.toggle('muted', muted);
    // Resume AudioContext if it was suspended (browser autoplay policy)
    if (!muted && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  });
  // -----------------------------------------------------------

  const GRID = 20;
  const COLS = canvas.width / GRID;
  const ROWS = canvas.height / GRID;

  const COLORS = {
    bg: '#0d0d14',
    gridLine: '#111118',
    snakeHead: '#00ff88',
    snakeBody: '#00cc6e',
    snakeBorder: '#009950',
    food: '#ff4466',
    foodGlow: 'rgba(255, 68, 102, 0.4)',
    foodInner: '#ff8899',
  };

  let snake, dir, nextDir, food, score, bestScore, running, paused, loopId, frame;

  bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
  bestEl.textContent = bestScore;

  function init() {
    snake = [
      { x: 10, y: 10 },
      { x: 9,  y: 10 },
      { x: 8,  y: 10 },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    scoreEl.textContent = 0;
    frame = 0;
    spawnFood();
  }

  function spawnFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS),
      };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function step() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > bestScore) {
        bestScore = score;
        bestEl.textContent = bestScore;
        localStorage.setItem('snakeBest', bestScore);
      }
      sfx.eat();
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    // Background
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = COLORS.gridLine;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= canvas.width; x += GRID) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= canvas.height; y += GRID) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // Food glow
    const pulse = 0.7 + 0.3 * Math.sin(frame * 0.15);
    const fx = food.x * GRID + GRID / 2;
    const fy = food.y * GRID + GRID / 2;
    const grad = ctx.createRadialGradient(fx, fy, 2, fx, fy, GRID * 1.2 * pulse);
    grad.addColorStop(0, COLORS.foodGlow);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(food.x * GRID - GRID, food.y * GRID - GRID, GRID * 3, GRID * 3);

    // Food
    ctx.fillStyle = COLORS.food;
    roundRect(ctx, food.x * GRID + 3, food.y * GRID + 3, GRID - 6, GRID - 6, 3);
    ctx.fill();
    ctx.fillStyle = COLORS.foodInner;
    ctx.beginPath();
    ctx.arc(food.x * GRID + 6, food.y * GRID + 6, 2, 0, Math.PI * 2);
    ctx.fill();

    // Snake
    snake.forEach((seg, i) => {
      const x = seg.x * GRID;
      const y = seg.y * GRID;
      const pad = i === 0 ? 1 : 2;
      const radius = i === 0 ? 5 : 3;

      ctx.fillStyle = i === 0 ? COLORS.snakeHead : COLORS.snakeBody;
      roundRect(ctx, x + pad, y + pad, GRID - pad * 2, GRID - pad * 2, radius);
      ctx.fill();

      ctx.strokeStyle = COLORS.snakeBorder;
      ctx.lineWidth = 1;
      roundRect(ctx, x + pad, y + pad, GRID - pad * 2, GRID - pad * 2, radius);
      ctx.stroke();
    });

    // Eyes on head
    const hx = snake[0].x * GRID;
    const hy = snake[0].y * GRID;
    const ex = dir.x, ey = dir.y;
    const eyeOffsets = ex !== 0
      ? [{ ox: ex * 6 + 6, oy: -4 }, { ox: ex * 6 + 6, oy: 4 }]
      : [{ ox: -4, oy: ey * 6 + 6 }, { ox: 4, oy: ey * 6 + 6 }];

    ctx.fillStyle = '#0a0a0f';
    eyeOffsets.forEach(({ ox, oy }) => {
      ctx.beginPath();
      ctx.arc(hx + GRID / 2 + ox, hy + GRID / 2 + oy, 2.2, 0, Math.PI * 2);
      ctx.fill();
    });

    frame++;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // Speed: starts at 150ms, gets faster every 5 points, min 60ms
  function getSpeed() {
    return Math.max(60, 150 - Math.floor(score / 5) * 10);
  }

  let lastStep = 0;
  function gameLoop(ts) {
    if (!running || paused) return;
    if (ts - lastStep >= getSpeed()) {
      step();
      lastStep = ts;
    }
    if (running) draw();
    if (running) loopId = requestAnimationFrame(gameLoop);
  }

  function startGame() {
    init();
    running = true;
    paused = false;
    overlay.style.display = 'none';
    lastStep = 0;
    sfx.start();
    loopId = requestAnimationFrame(gameLoop);
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(loopId);
    sfx.die();

    overlay.className = 'gameover';
    overlay.innerHTML = `
      <h2>Game Over</h2>
      <p class="final-score">Score: ${score}</p>
      ${score === bestScore && score > 0 ? '<p style="color:#00ccff;font-size:0.85rem;letter-spacing:2px;">New Best!</p>' : ''}
      <button id="start-btn">Play Again</button>
    `;
    overlay.style.display = 'flex';
    document.getElementById('start-btn').addEventListener('click', startGame);
  }

  // Controls
  const keyMap = {
    ArrowUp:    { x: 0, y: -1 },
    ArrowDown:  { x: 0, y: 1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 },
    s: { x: 0, y: 1 },
    a: { x: -1, y: 0 },
    d: { x: 1, y: 0 },
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'p' || e.key === 'P') {
      if (!running) return;
      paused = !paused;
      if (!paused) loopId = requestAnimationFrame(gameLoop);
      return;
    }
    const d = keyMap[e.key];
    if (!d) return;
    // Prevent reversing
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      e.preventDefault();
    }
  });

  startBtn.addEventListener('click', startGame);

  // Initial static draw
  init();
  draw();
  overlay.style.display = 'flex';
</script>
</body>
</html>
